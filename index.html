<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransformTrack 소개서 빌더</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://unpkg.com/cfb@1.2.2/dist/cfb.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- 1. Data (plain JS) -->
  <script src="data/templates.js"></script>
  <script src="data/frames.js"></script>

  <!-- 2. Shared utilities (plain JS, no JSX) -->
  <script src="components/shared/imageHandlers.js"></script>
  <script src="components/shared/renderHelpers.js"></script>
  <script src="components/shared/ImageArea.js"></script>
  <script src="components/shared/fileParser.js"></script>
  <script src="components/shared/aiService.js"></script>

  <!-- 3. Renderers (JSX) -->
  <script type="text/babel" src="components/renderers/IndexRenderer.js"></script>
  <script type="text/babel" src="components/renderers/CoverRenderer.js"></script>
  <script type="text/babel" src="components/renderers/TableRenderer.js"></script>
  <script type="text/babel" src="components/renderers/CoreValueRenderer.js"></script>
  <script type="text/babel" src="components/renderers/FaqRenderer.js"></script>
  <script type="text/babel" src="components/renderers/SectionRenderer.js"></script>
  <script type="text/babel" src="components/renderers/MobileRenderer.js"></script>
  <script type="text/babel" src="components/renderers/PcRenderer.js"></script>
  <script type="text/babel" src="components/renderers/GenericRenderer.js"></script>

  <!-- 4. Thumbnails (JSX) -->
  <script type="text/babel" src="components/thumbnails/TableThumb.js"></script>
  <script type="text/babel" src="components/thumbnails/CoverThumb.js"></script>
  <script type="text/babel" src="components/thumbnails/FaqThumb.js"></script>
  <script type="text/babel" src="components/thumbnails/SectionThumb.js"></script>
  <script type="text/babel" src="components/thumbnails/DeviceThumb.js"></script>
  <script type="text/babel" src="components/thumbnails/GenericThumb.js"></script>

  <!-- 5. Main components (JSX, depend on renderers/thumbnails) -->
  <script type="text/babel" src="components/SlideCanvas.js"></script>
  <script type="text/babel" src="components/TemplateThumbnail.js"></script>
  <script type="text/babel" src="components/OnboardingModal.js"></script>

  <!-- 6. App entry -->
  <script type="text/babel" src="app.js"></script>
</body>
</html>
